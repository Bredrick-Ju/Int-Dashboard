version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: worklyft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: worklyft
      POSTGRES_PASSWORD: worklyft_secret
      POSTGRES_DB: worklyft_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U worklyft -d worklyft_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worklyft-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://worklyft:worklyft_secret@postgres:5432/worklyft_db?schema=public
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: worklyft-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
